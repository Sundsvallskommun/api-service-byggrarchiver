openapi:
  description: '@project.description@'
  name: ${spring.application.name}
  title: ByggR Archiver
  version: '@project.version@'
resilience4j.circuitbreaker:
  instances:
    archive:
      ignore-exceptions:
        - se.sundsvall.dept44.exception.ClientProblem
      # Archive returns 500 (should be 422) for per-document content/format rejection - a business
      # condition, not an outage. Don't let it open the breaker. Remove when Archive returns 4xx.
      ignore-exception-predicate: se.sundsvall.byggrarchiver.integration.archive.ArchiveFormatRejectionPredicate
    messaging:
      ignore-exceptions:
        - se.sundsvall.dept44.exception.ClientProblem
    arendeExport:
      # A SOAP fault means ByggR answered (e.g. "Item not found") - a business condition, not an outage.
      # Don't let it open the breaker. Real unavailability surfaces as connection/timeout errors, which still count.
      ignore-exceptions:
        - jakarta.xml.ws.soap.SOAPFaultException
resilience4j.retry:
  instances:
    archive:
      ignore-exceptions:
        - se.sundsvall.dept44.exception.ClientProblem
      # Retrying a deterministic format rejection never succeeds and re-uploads the payload each attempt. See breaker note.
      ignore-exception-predicate: se.sundsvall.byggrarchiver.integration.archive.ArchiveFormatRejectionPredicate
    messaging:
      ignore-exceptions:
        - se.sundsvall.dept44.exception.ClientProblem
spring:
  application:
    name: api-byggrarchiver
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: false
logbook:
  body-filters:
    xPath:
      - key: '//*[contains(local-name(), "filBuffer")]'
        value: '[binary]'
      - key: '//*[contains(local-name(), "GetUpdatedArendenResponse")]'
        value: '[filtered-xml]'
    jsonPath:
      - key: '$..file'
        value: '[base64]'
  # NOTE: do NOT set logbook.logs.maxBodySizeToLog. dept44 registers truncate() before the body filters, so any body
  # larger than the limit is cut into malformed XML/JSON and the filters below silently stop redacting (the filBuffer
  # base64 / file contents then leak into the logs). The filters already shrink the logged payload by redacting binary.
scheduler:
  name: archive
  cron:
    expression: '-'
  shedlock-lock-at-most-for: PT2M
  maximum-execution-time: PT2M
